<!DOCTYPE html>
<html>
<head>
  <title>bibiz characters</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #1a1a1a, #2b2b3c);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 40px;
      color: #c084fc;
    }

    .container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      background: #222;
      margin: 20px;
      padding: 15px;
      border-radius: 20px;
      width: 220px;
      box-shadow: 0 0 20px rgba(192,132,252,0.3);
    }

    img {
      width: 100%;
      border-radius: 15px;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 15px;
      border-radius: 15px;
      background: #c084fc;
      color: black;
      text-decoration: none;
    }

    .btn:hover {
      background: #a855f7;
    }
  </style>
</head>

<body>

<h1>my characters 🖤</h1>

<div class="container">

  <div class="card">
    <img src="https://i.pinimg.com/236x/8b/1c/6f/8b1c6f4a7c3c1d6b5c9d0a1f6c9d3b5a.jpg">
    <h3>Raven</h3>
    <a href="raven.html" class="btn">View</a>
  </div>

  <div class="card">
    <img src="https://i.pinimg.com/236x/3c/5f/1a/3c5f1a7e4d6c2b5f1a3d9c6e8b7a1c2d.jpg">
    <h3>Nyx</h3>
    <a href="nyx.html" class="btn">View</a>
  </div>

</div>

</body>
</html>
