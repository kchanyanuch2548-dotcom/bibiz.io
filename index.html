<!DOCTYPE html>
<html>
<head>
  <title>bibiz</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Arial';
      background: linear-gradient(135deg, #ffd6e0, #d6e0ff);
      text-align: center;
    }

    .card {
      margin-top: 100px;
      background: white;
      padding: 30px;
      border-radius: 25px;
      display: inline-block;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h1 {
      color: #ff66a3;
      font-size: 40px;
    }

    p {
      color: #666;
      font-size: 18px;
    }

    img {
      width: 150px;
      border-radius: 50%;
      margin-bottom: 15px;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      background: #ff66a3;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #ff3385;
    }
  </style>
</head>

<body>

<div class="card">
  <img src="https://i.pinimg.com/236x/9c/7e/3c/9c7e3c4b8d6c6d6f5e4c2a1f6c9d3b5a.jpg">
  <h1>bibiz 🌙</h1>
  <p>This is my little world ✨</p>
  <button onclick="alert('hello 💖')">click me</button>
</div>

</body>
</html>
