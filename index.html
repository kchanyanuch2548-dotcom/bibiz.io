<!DOCTYPE html>
<html>
<head>
  <title>bibiz characters</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #1a1a1a, #2b2b3c);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 50px;
      font-size: 40px;
      color: #c084fc;
    }

    .card {
      background: #222;
      margin: 30px auto;
      padding: 20px;
      border-radius: 20px;
      width: 250px;
      box-shadow: 0 0 20px rgba(192,132,252,0.3);
    }

    img {
      width: 100%;
      border-radius: 15px;
    }

    h2 {
      margin: 10px 0;
      color: #e0b3ff;
    }

    p {
      font-size: 14px;
      color: #bbb;
    }

    .tag {
      display: inline-block;
      margin-top: 10px;
      padding: 5px 10px;
      border-radius: 10px;
      background: #c084fc;
      color: black;
      font-size: 12px;
    }
  </style>
</head>

<body>

<h1>my characters 🖤</h1>

<div class="card">
  <img src="https://i.pinimg.com/236x/8b/1c/6f/8b1c6f4a7c3c1d6b5c9d0a1f6c9d3b5a.jpg">
  <h2>Raven</h2>
  <p>A quiet soul who walks between shadows.</p>
  <div class="tag">Adoptable</div>
</div>

<div class="card">
  <img src="https://i.pinimg.com/236x/3c/5f/1a/3c5f1a7e4d6c2b5f1a3d9c6e8b7a1c2d.jpg">
  <h2>Nyx</h2>
  <p>Born from the night, never meant to belong.</p>
  <div class="tag">Owned</div>
</div>

</body>
</html>
